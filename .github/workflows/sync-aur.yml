name: Sync AUR Packages
on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'packages.txt'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: aur-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Validate packages.txt exists
        run: |
          if [[ ! -f packages.txt ]]; then
            echo "::error::packages.txt not found at repo root"
            exit 1
          fi

      - name: Sync packages and prune removed
        id: sync
        run: |
          set -uo pipefail
          mkdir -p /tmp/aur-clone
          SYNCED=()
          FAILED=()
          REMOVED=()

          echo "Cloning CachyOS-PKGBUILDS repository..."
          rm -rf /tmp/cachyos-pkgbuilds
          if ! git clone --depth=1 "https://github.com/CachyOS/CachyOS-PKGBUILDS.git" /tmp/cachyos-pkgbuilds >/tmp/cachyos-clone.log 2>&1; then
            echo "::warning::Failed to clone CachyOS repository"
          fi

          mapfile -t VALID_PKGS < <(sed 's/#.*//' packages.txt | awk '{print $1}' | grep -v '^$' | sed 's/^local://')

          for dir in */ ; do
            [[ -e "$dir" ]] || continue
            dir="${dir%/}"
            case "$dir" in
              .github) continue ;;
            esac
            if ! printf '%s\n' "${VALID_PKGS[@]}" | grep -q -x "$dir"; then
              echo "Removing obsolete package directory: $dir"
              rm -rf "$dir"
              REMOVED+=("$dir")
            fi
          done

          while IFS= read -r raw_line || [[ -n "$raw_line" ]]; do
            pkg_entry="$(echo "$raw_line" | sed 's/#.*//' | xargs)"
            [[ -z "$pkg_entry" ]] && continue

            if [[ "$pkg_entry" == local:* ]]; then
              pkg="${pkg_entry#local:}"
              echo "Skipping sync for local package: $pkg"
              continue
            fi

            pkg="$pkg_entry"
            
            echo "Checking CachyOS-PKGBUILDS for $pkg..."
            cachyos_dir=$(find /tmp/cachyos-pkgbuilds -mindepth 1 -maxdepth 4 -type d -name "$pkg" -not -path "*/\.git/*" -print -quit)

            if [[ -n "$cachyos_dir" ]]; then
              echo "Found $pkg in CachyOS-PKGBUILDS"
              echo "Syncing files for $pkg from CachyOS"
              mkdir -p "$pkg"
              find "$pkg" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
              rsync -a --exclude='.git' "$cachyos_dir/" "$pkg/"
              SYNCED+=("$pkg")
              continue
            fi

            echo "Not found in CachyOS. Cloning $pkg from AUR..."
            rm -rf "/tmp/aur-clone/$pkg"

            if ! git clone --depth=1 "https://aur.archlinux.org/${pkg}.git" "/tmp/aur-clone/$pkg" >/tmp/clone.log 2>&1; then
              echo "::warning::Clone failed for $pkg"
              cat /tmp/clone.log
              FAILED+=("$pkg")
              continue
            fi

            echo "Syncing files for $pkg from AUR"
            mkdir -p "$pkg"
            find "$pkg" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            rsync -a --exclude='.git' "/tmp/aur-clone/$pkg/" "$pkg/"

            SYNCED+=("$pkg")
          done < packages.txt

          echo "synced=${SYNCED[*]}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED[*]}" >> "$GITHUB_OUTPUT"
          echo "removed=${REMOVED[*]}" >> "$GITHUB_OUTPUT"

          echo "### Sync summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Synced: ${SYNCED[*]:-none}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Failed: ${FAILED[*]:-none}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Removed: ${REMOVED[*]:-none}" >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update aggregated pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(aur-sync): sync package sources and prune deletions'
          branch: aur-sync
          delete-branch: true
          title: 'AUR sync: cập nhật và dọn dẹp source packages'
          labels: aur-sync
          body: |
            ### 🔄 AUR / CachyOS Synchronization Report

            Hệ thống tự động đã thực hiện kiểm tra và đồng bộ hóa các gói từ CachyOS và AUR.

            | Trạng thái | Gói phần mềm |
            | :--- | :--- |
            | 🟢 **Synced Successfully** | `${{ steps.sync.outputs.synced || 'none' }}` |
            | 🔴 **Failed to Sync** | `${{ steps.sync.outputs.failed || 'none' }}` |
            | 🧹 **Pruned / Removed** | `${{ steps.sync.outputs.removed || 'none' }}` |

            ---
            *Vui lòng kiểm tra trạng thái verify build bên dưới trước khi thực hiện merge.*
